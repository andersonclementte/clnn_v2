experiment_name: humob_v2_smoke
logging:
  tracking_uri: "file:/tmp/mlruns"

data:
  parquet_file: "humob_all_cities_v2_normalized.parquet"
  base_city: "A"
  finetune_cities: ["B", "C", "D"]

model:
  n_clusters: 16
  n_users: 100000
  sequence_length: 12
  max_sequences_per_user: 50
  # Fase 1 — reparametrização
  user_emb_dim: 32
  city_emb_dim: 8
  temporal_dim: 16
  poi_out_dim: 16
  lstm_hidden: 64
  fusion_dim: 128
  # Fase 2 — loss CE + MSE auxiliar
  loss_alpha: 0.1
  # Fase 4 — scheduled sampling
  max_scheduled_p: 0.5
  # Fase 5 — encoder
  encoder:
    type: "transformer"
    transformer_nhead: 4
    transformer_num_layers: 2
    transformer_ff_dim: 256
    transformer_dropout: 0.1

training:
  base:
    n_epochs: 2               # >1 para que resume de epoch 1 ainda execute epoch 2
    learning_rate: 3e-4
    batch_size: 32
    resume_from_checkpoint: true
    max_train_batches: 20     # só 20 batches de treino — valida forward/backward/loss
    max_val_batches: 5        # só 5 batches de val — valida loop de avaliação
    mixed_precision: true
  finetune:
    n_epochs: 1
    learning_rate: 5e-5
    batch_size: 32
    max_train_batches: 10
    max_val_batches: 3

hardware:
  device: "cuda"
  pin_memory: true
  num_workers: 0

eval:
  compare: true
  n_samples: 50             # amostra pequena para comparação rápida
  pred_gt:
    enabled: false

submission:
  enabled: false

outputs:
  models_path: "outputs/models/"
  submissions_path: "outputs/submissions/"
  plots_path: "outputs/plots/"
  eval_path: "outputs/eval/"
