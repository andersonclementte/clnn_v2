experiment_name: humob2
logging:
  tracking_uri: "file:./mlruns"

data:
  parquet_file: "humob_all_cities_v2_normalized.parquet"
  base_city: "A"
  finetune_cities: ["B","C","D"]

model:
  n_clusters: 512        # poucos clusters para acelerar o KMeans
  n_users: 100000          # amostra pequena de usuários
  sequence_length: 720   # janelas curtas

training:
  base:
    n_epochs: 8
    learning_rate: 3e-4
    batch_size: 64
    mixed_precision: true
  finetune:
    n_epochs: 5
    learning_rate: 5e-5
    batch_size: 16

hardware:
  device: "cuda"        # cai para "cpu" se não tiver GPU
  pin_memory: true
  num_workers: 0        # IterableDataset: evita duplicar leitura

eval:
  compare: true
  pred_gt:
    enabled: true                  # 👈 liga a geração do Parquet Pred+GT
    split: "test"                   # use "val" (garante GT). "test" só se seu dataset expor GT
    day_range: [61, 75]            # opcional; em "val" pode ser omitido
    batch_size: 2048
    target_cities: ["B","C","D"]

submission:
  enabled: False
  days: [61, 75]
  target_cities: ["B","C","D"]

outputs:
  models_path: "outputs/models/"
  submissions_path: "outputs/submissions/"
  plots_path: "outputs/plots/"
  eval_path: outputs/eval
